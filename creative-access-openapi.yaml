        totalLegalVacationWeekDayNightOvertimeInMinutes:
          type: number
          example: 0.0
        totalLegalVacationWeekendOvertimeInMinutes:
          type: number
          example: 0.0
        totalLegalVacationWeekendNightOvertimeInMinutes:
          type: number
          example: 0.0
        totalBonusOvertimeInMinutes:
          type: number
          example: 0.0
        totalMealTicketsCount:
          type: integer
          description: Meal tickets for the period
          example: 21
        vacationsAndLeaves:
          type: array
          items:
            type: object
            properties:
              index:
                type: integer
                description: Observation code
                example: 1
              daysCount:
                type: integer
                description: Number of days with this observation
                example: 5
              name:
                type: string
                description: Observation name
                example: "CO"

    AreaActivityItem:
      type: object
