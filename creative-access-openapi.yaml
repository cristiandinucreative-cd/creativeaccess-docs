        totalWeekDayOvertimeInMinutes:
          type: number
          example: 1375.51
        totalWeekDayNightOvertimeInMinutes:
          type: number
          example: 0.0
        totalWeekendOvertimeInMinutes:
          type: number
          example: 0.0
        totalWeekendNightOvertimeInMinutes:
          type: number
          example: 0.0
        totalLegalVacationWeekDayOvertimeInMinutes:
